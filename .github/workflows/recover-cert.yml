name: Recover signing certificate

# TEMPORARIO: extrai o secrets.CERT_ENC de volta pra um .pfx, criptografa com
# uma passphrase de uso unico (repo e PUBLICO, artifact fica exposto) e sobe o
# .enc como artifact. Apagar este arquivo depois de baixar/decifrar.
# Rodar: aba Actions -> "Recover signing certificate" -> Run workflow ->
# preencher a passphrase.
on:
  workflow_dispatch:
    inputs:
      passphrase:
        description: "Passphrase de uso unico pra cifrar o pfx (voce decifra local com ela)"
        required: true

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Decode CERT_ENC and encrypt for transport
        shell: bash
        env:
          CERT_ENC: ${{ secrets.CERT_ENC }}
          PASS: ${{ inputs.passphrase }}
        run: |
          mkdir -p out
          printf '%s' "$CERT_ENC" | base64 -d > codesign.pfx
          echo "pfx decodificado: $(wc -c < codesign.pfx) bytes"
          openssl enc -aes-256-cbc -salt -pbkdf2 -iter 200000 \
            -pass env:PASS -in codesign.pfx -out out/codesign.pfx.enc
          rm -f codesign.pfx
          echo "enc gerado: $(wc -c < out/codesign.pfx.enc) bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: codesign-pfx-enc
          path: out/codesign.pfx.enc
          retention-days: 1
          if-no-files-found: error
