name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to publish the release under (only needed for a manual run with no real tag push)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-sign-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Np2ptpGui.sln

      - name: Test
        shell: pwsh
        run: |
          # ProcessRunnerTests' Ctrl+C test is a documented pre-existing timing
          # flake (see docs/LESSONS-LEARNED.md); a TaskManagerTests store-
          # cleanup test has shown the same one-off timing flakiness locally.
          # Both always pass on retry and aren't caused by whatever this run
          # is actually building. One retry here matches that established
          # local practice instead of failing the whole release on a flake.
          dotnet test Np2ptpGui.sln -c Release --no-restore
          if ($LASTEXITCODE -ne 0) {
            Write-Host "First test run failed, retrying once..."
            dotnet test Np2ptpGui.sln -c Release --no-restore
          }
          exit $LASTEXITCODE

      - name: Publish
        run: >
          dotnet publish src/Np2ptpGui/Np2ptpGui.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Decode signing certificate
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String('${{ secrets.CERT_ENC }}')
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\codesign.pfx", $bytes)

      - name: Sign np2ptp-gui.exe
        shell: pwsh
        run: |
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /f "$env:RUNNER_TEMP\codesign.pfx" /p "${{ secrets.CERT_PASS }}" `
            /fd sha256 /tr http://timestamp.digicert.com /td sha256 "publish\Np2ptpGui.exe"

      - name: Clean up certificate
        if: always()
        shell: pwsh
        run: Remove-Item "$env:RUNNER_TEMP\codesign.pfx" -ErrorAction SilentlyContinue

      - name: Zip published output
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath np2ptp-gui-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          # A manual dispatch can label the build under any tag_name, which
          # decouples what's signed from what a real "vX.X.X" tag push always
          # guarantees (the artifact matches that exact tagged commit). Publish
          # those as drafts - invisible to normal users until a human explicitly
          # reviews and hits "Publish release" on GitHub. Real tag pushes still
          # auto-publish, since there's no such mismatch possible there.
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          files: np2ptp-gui-win-x64.zip
          generate_release_notes: true
